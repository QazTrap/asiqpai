<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asiqpai Official</title>

<!-- TON Connect -->
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
    .title{
    font-size:56px;
    margin:10px 0;
    font-weight:900;
    letter-spacing:3px;
    color:#d4af37;
    text-shadow:0 0 18px rgba(212,175,55,.4);
}

.subtitle{
    font-size:18px;
    color:#777;
    margin-bottom:35px;
    letter-spacing:1px;
}
.logo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    margin:20px auto;
    display:block;

    box-shadow:0 0 35px rgba(255,215,0,.45);

    transition:.4s;
}

.logo:hover{
    transform:scale(1.05);
}
body{
    background:white;
    color:black;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:40px;
    margin:0;
}

h1{
    font-size:50px;
}

.button{
    display:block;
    background:#0088ff;
    color:white;
    padding:15px;
    margin:15px auto;
    width:250px;
    border-radius:12px;
    text-decoration:none;
    transition:0.3s;
}

.button:hover{
    background:#0066cc;
}

#ton-connect{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

audio{
    width:300px;
    margin-top:20px;
}

</style>

</head>

<body>

<div id="ton-connect"></div>
<img src="images/logo.png" class="logo" alt="ASIQPAI Logo">
<h1 class="title">ASIQPAI</h1>

<p class="subtitle">
Music Artist • Producer • Beatmaker
</p>

<a class="button" href="https://t.me/asiqpai">Telegram</a>

<a class="button" href="https://youtube.com/@asiqpai">YouTube</a>

<a class="button" href="https://www.tiktok.com/@asiqpai">TikTok</a>

<a class="button" href="https://www.instagram.com/asiqpai">Instagram</a>

<a class="button" href="https://open.spotify.com/">Spotify</a>

<h2>TRAP Release</h2>
<audio controls>
    <source src="music/track.mp3" type="audio/mpeg">
    Ваш браузер не поддерживает аудио.
  </audio>
<h2>🎹 Beat Store</h2>

<div class="beat-card">

    <h3>Beat 1</h3>

    <p>BPM: 140</p>

    <p>Key: F#m</p>

    <audio controls>
        <source src="music/track.mp3" type="audio/mpeg">
    </audio>

    <button class="buy-button">
    💎 Buy Beat — 10 TON
    </button>

</div>
<p><b>Web3</b></p>

<p>asiqpai.ton</p>

<script>

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://qaztrap.github.io/asiqpai/tonconnect-manifest.json',
    buttonRootId: 'ton-connect'
});

</script>

</body>
</html>
