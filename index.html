<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
    .graffiti{
    font-family:'Rubik Glitch', cursive;
    font-size:42px;
    color:#d4af37;
    margin:25px 0;
}
    .beat-card{
    width:320px;
    max-width:90%;
    margin:30px auto;
    padding:20px;
    background:#1b1b1b;
    border-radius:16px;
    box-shadow:none;
    transition:.3s;

    transition:.3s;
}

.buy-button:hover{
    background:#c59d2c;

}
    .title{
    font-size:56px;
    margin:10px 0;
    font-weight:900;
    letter-spacing:3px;
    color:#d4af37;
    text-shadow:0 0 18px rgba(212,175,55,.4);
}

.subtitle{
    font-size:18px;
    color:#bdbdbd;
    margin-bottom:35px;
    letter-spacing:1px;
}
  .logo{
    width:270px;
    height:auto;

    display:block;
    margin:1px auto;

    object-fit:cover;
    border-radius:50%;

    box-shadow:none;

    transition:.4s;
    animation: glow 3s ease-in-out infinite;  
}

.logo:hover{
    transform:scale(1.05);
}
body{ background:#060505; 
     color:white; 
     font-family:Arial, sans-serif; 
     text-align:center; padding:40px; 
     margin:0; };
}
h1{
    font-size:50px;
}

.button{

    display:block;

    max-width:300px;
    width:90%;

    margin:15px auto;

    padding:15px;

    border-radius:12px;

    text-decoration:none;

    background:#1b1b1b;

    color:#d4af37;

    border:1px solid #d4af37;

    transition:.3s;
}

.button:hover{

    background:#d4af37;

    color:#111;
}

#ton-connect{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

audio{
    width:280px;
    margin-top:60px;
}
.player{

    width:100%;
    max-width:340px;

    margin:30px auto;

    padding:18px;

    box-sizing:border-box;

    background:#1b1b1b;

    border-radius:18px;

    box-shadow:0 0 20px rgba(212,175,55,.18);

}
#playButton{

    width:70px;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:0 auto;

    border:none;
    border-radius:50%;

    background:#d4af37;
    color:black;

    font-size:30px;

    cursor:pointer;

    padding:0;

    line-height:1;

}

#trackName{

    display:block;

    margin-top:15px;

    color:white;

    font-size:18px;

    font-weight:bold;

}
.controls{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:25px;

    margin-top:20px;

}

.controls button{

    width:42px;

    height:42px;

    border:none;

    border-radius:5%;

    background:#d4af37;

    color:black;

    cursor:pointer;

    font-size:18px;

    transition:.3s;

}

.controls button:hover{

    transform:scale(1.1);

    background:#c59d2c;

}

#playButton{

    width:70px;

    height:70px;

    font-size:28px;

}

.progress-container{

    display:flex;

    align-items:center;

    gap:10px;

    margin-top:20px;

}

#progress{

    flex:1;

    cursor:pointer;

}

#currentTime,
#duration{

    color:white;

    font-size:14px;

    width:40px;

} 
@keyframes glow{

    0%{
        filter:brightness(1);
    }

    50%{
        filter:brightness(1.2);
    }

    100%{
        filter:brightness(1);
    }

}    
</style>

</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">
<body>

<div id="ton-connect"></div>
<img src="images/crow.png" class="logo" alt="ASIQPAI Logo">
<h1 class="title">ASIQPAI</h1>

<p class="subtitle">
Music Artist • Producer • Beatmaker
</p>

<a class="button" href="https://t.me/asiqpai">Telegram</a>

<a class="button" href="https://open.spotify.com/">Spotify</a>

<h2 class="graffiti">TRAP RELEASE</h2>
                                     
<audio id="player"></audio>

<div class="player">

    <div id="trackName">
       🎵 Asiqpai - track #1
    </div>


<div class="controls">

    <button id="prevButton">
        <i class="fa-solid fa-backward-step"></i>
    </button>

    <button id="playButton">
        <i class="fa-solid fa-play"></i>
    </button>

    <button id="nextButton">
        <i class="fa-solid fa-forward-step"></i>
    </button>

</div>

<div class="progress-container">

    <span id="currentTime">0:00</span>

    <input type="range" id="progress" value="0" min="0" max="100">

    <span id="duration">0:00</span>

</div>
</div>
    
<h2>🎹 Beat Store</h2>

<div class="beat-card">

<h3>⭐⭐⭐⭐⭐</h3>
<p><strong>BPM:</strong> 148</p>
<p><strong>Key:</strong> F#m</p>
<button class="buy-button" onclick="buyBeat()">
💎 Buy — 10 GRAM
</button>

</div>
<p><b>Web3</b></p>

<p>asiqpai.ton</p>

<script>
const playlist = [
    {
        title: "🎵 Asiqpai - Track #1",
        file: "music/track.mp3"
    }
];

let currentTrack = 0;

// =======================
// TON CONNECT
// =======================

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://qaztrap.github.io/asiqpai/tonconnect-manifest.json",
    buttonRootId: "ton-connect"
});

// =======================
// ПОКУПКА БИТА
// =======================

async function buyBeat() {

    try {

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [
                {
                    address: "UQCe36C6cCa5uQoOS34ljjfsbOLGfjMxqXvwFqFvMzISERqh",
                    amount: "10000000000"
                }
            ]
        };

        await tonConnectUI.sendTransaction(transaction);

        alert("Спасибо за покупку!");

    } catch (e) {

        alert("Сначала подключи кошелёк 🖕.");

    }

}

// =======================
// ПЛЕЕР
// =======================

const player = document.getElementById("player");
const playButton = document.getElementById("playButton");
const trackName = document.getElementById("trackName");

const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

// =======================

function loadTrack(index){

    player.src = playlist[index].file;

    trackName.textContent = playlist[index].title;

}

// =======================
// PLAY / PAUSE
// =======================

playButton.onclick = function(){

    if(player.paused){

        player.play();

        playButton.innerHTML =
        '<i class="fa-solid fa-pause"></i>';

    }else{

        player.pause();

        playButton.innerHTML =
        '<i class="fa-solid fa-play"></i>';

    }

};

// =======================
// NEXT
// =======================

document.getElementById("nextButton").onclick = function(){

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML =
    '<i class="fa-solid fa-pause"></i>';

};

// =======================
// PREVIOUS
// =======================

document.getElementById("prevButton").onclick = function(){

    currentTrack--;

    if(currentTrack < 0){

        currentTrack = playlist.length - 1;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML =
    '<i class="fa-solid fa-pause"></i>';

};

// =======================
// ПРОГРЕСС
// =======================

player.addEventListener("loadedmetadata", function(){

    duration.textContent =
    formatTime(player.duration);

});

player.addEventListener("timeupdate", function(){

    if(player.duration){

        progress.value =
        (player.currentTime / player.duration) * 100;

        currentTime.textContent =
        formatTime(player.currentTime);

    }

});

progress.addEventListener("input", function(){

    if(player.duration){

        player.currentTime =
        (progress.value / 100) * player.duration;

    }

});

// =======================
// ФОРМАТ ВРЕМЕНИ
// =======================

function formatTime(seconds){

    const minutes = Math.floor(seconds / 60);

    const secs = Math.floor(seconds % 60);

    return minutes + ":" + secs.toString().padStart(2,"0");

}

// =======================
// ЗАГРУЗКА ПЕРВОГО ТРЕКА
// =======================

loadTrack(currentTrack);
</script>

</body>
