<style>
    .graffiti{
    font-family:'Rubik Glitch', cursive;
    font-size:42px;
    color:#d4af37;
    margin:25px 0;
}
    .beat-card{
    width:320px;
    max-width:90%;
    margin:30px auto;
    padding:20px;
    background:#1b1b1b;
    border-radius:16px;
    box-shadow:none;
    transition:.3s;
    position:relative;
    right:6px;
}

.beat-card:hover{
    transform:translateY(-4px);
}

.buy-button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#d4af37;
    color:#111;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.buy-button:hover{
    background:#c59d2c;
    transform:scale(1.03);
}
    .title{
    font-size:56px;
    margin:10px 0;
    font-weight:900;
    letter-spacing:3px;
    color:#d4af37;
    text-shadow:0 0 18px rgba(212,175,55,.4);
}

.subtitle{
    font-size:18px;
    color:#bdbdbd;
    margin-bottom:35px;
    letter-spacing:1px;
}
.logo{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    margin:20px auto;
    display:block;

    box-shadow:none;

    transition:.4s;
}

.logo:hover{
    transform:scale(1.05);
}
body{
    background:#0d0d0d;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:40px;
    margin:0;
}

h1{
    font-size:50px;
}

.button{

    display:block;

    max-width:300px;
    width:90%;

    margin:15px auto;

    padding:15px;

    border-radius:12px;

    text-decoration:none;

    background:#1b1b1b;

    color:#d4af37;

    border:1px solid #d4af37;

    transition:.3s;
}

.button:hover{

    background:#d4af37;

    color:#111;
}

#ton-connect{
    display:flex;
    justify-content:center;
    margin-bottom:30px;
}

audio{
    width:280px;
    margin-top:60px;
}
.player{

    width:100%;
    max-width:340px;

    margin:30px auto;

    padding:18px;

    box-sizing:border-box;

    background:#1b1b1b;

    border-radius:18px;

    box-shadow:0 0 20px rgba(212,175,55,.18);

}
#playButton{

    width:70px;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;

    margin:0 auto;

    border:none;
    border-radius:50%;

    background:#d4af37;
    color:black;

    font-size:30px;

    cursor:pointer;

    padding:0;

    line-height:1;

}

#trackName{

    display:block;

    margin-top:15px;

    color:white;

    font-size:18px;

    font-weight:bold;

}
.controls{

    display:flex;

    justify-content:center;

    align-items:center;

    gap:25px;

    margin-top:20px;

}

.controls button{

    width:55px;

    height:55px;

    border:none;

    border-radius:50%;

    background:#d4af37;

    color:black;

    cursor:pointer;

    font-size:22px;

    transition:.3s;

}

.controls button:hover{

    transform:scale(1.1);

    background:#c59d2c;

}

#playButton{

    width:70px;

    height:70px;

    font-size:28px;

}

#trackName{

    color:white;

    font-size:22px;

    font-weight:bold;

    margin-bottom:10px;

}
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">
<body>

<div id="ton-connect"></div>
<img src="images/logo.png" class="logo" alt="ASIQPAI Logo">

<h2 class="graffiti2">TRAP RELEASE</h2>
                                     
<audio id="player">
    <source src="music/track.mp3" type="audio/mpeg">
</audio>
<div class="player">

    <div id="trackName">
        TRAP RELEASE
    </div>

    <div class="controls">

        <button id="prevButton">
            <i class="fa-solid fa-backward-step"></i>
        </button>

        <button id="playButton">
            <i class="fa-solid fa-play"></i>
        </button>

        <button id="nextButton">
            <i class="fa-solid fa-forward-step"></i>
        </button>

    </div>

</div>
    
<h2>🎹 Beat Store</h2>

<div class="beat-card">

<h3>⭐⭐⭐⭐⭐</h3>
<p><strong>BPM:</strong> 148</p>
<p><strong>Key:</strong> F#m</p>
<button class="buy-button" onclick="buyBeat()">
💎 Buy — 10 GRAM
</button>

</div>
<p><b>Web3</b></p>

<p>asiqpai.ton</p>

<script>

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://qaztrap.github.io/asiqpai/tonconnect-manifest.json',
    buttonRootId: 'ton-connect'
});    
async function buyBeat() {

    try {

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [
                {
                    address: "UQCe36C6cCa5uQoOS34ljjfsbOLGfjMxqXvwFqFvMzISERqh",
                    amount: "10000000000"
                }
            ]
        };

        await tonConnectUI.sendTransaction(transaction);

        alert("Спасибо за покупку!");

    } catch (e) {

        alert("Сначала подключите кошелек.");

    }

}
const player = document.getElementById("player");
const playButton = document.getElementById("playButton");

playButton.onclick = function(){

    if(player.paused){

        player.play();

        playButton.innerHTML = '<i class="fa-solid fa-pause"></i>';

    }else{

        player.pause();

        playButton.innerHTML = '<i class="fa-solid fa-play"></i>';

    }

};
const trackName = document.getElementById("trackName");

function loadTrack(index){

    player.src = playlist[index].file;

    trackName.innerHTML = playlist[index].title;

}

document.getElementById("nextButton").onclick = function(){

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML = '<i class="fa-solid fa-pause"></i>';

}

document.getElementById("prevButton").onclick = function(){

    currentTrack--;

    if(currentTrack < 0){

        currentTrack = playlist.length - 1;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML = '<i class="fa-solid fa-pause"></i>';

}

loadTrack(currentTrack);

} 
const playlist = [
    {
        title: "TRAP RELESE",
        file: "music/track.mp3"
    }
];

let currentTrack = 0;    
</script>
