<script>
const playlist = [
    {
        title: "Asiqpai - Track #1",
        file: "music/track.mp3"
    }
];

let currentTrack = 0;

// =======================
// TON CONNECT
// =======================

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: "https://qaztrap.github.io/asiqpai/tonconnect-manifest.json",
    buttonRootId: "ton-connect"
});

// =======================
// ПОКУПКА БИТА
// =======================

async function buyBeat() {

    try {

        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 600,
            messages: [
                {
                    address: "UQCe36C6cCa5uQoOS34ljjfsbOLGfjMxqXvwFqFvMzISERqh",
                    amount: "10000000000"
                }
            ]
        };

        await tonConnectUI.sendTransaction(transaction);

        alert("Спасибо за покупку!");

    } catch (e) {

        alert("Сначала подключите кошелёк.");

    }

}

// =======================
// ПЛЕЕР
// =======================

const player = document.getElementById("player");
const playButton = document.getElementById("playButton");
const trackName = document.getElementById("trackName");

const progress = document.getElementById("progress");
const currentTime = document.getElementById("currentTime");
const duration = document.getElementById("duration");

// =======================

function loadTrack(index){

    player.src = playlist[index].file;

    trackName.textContent = playlist[index].title;

}

// =======================
// PLAY / PAUSE
// =======================

playButton.onclick = function(){

    if(player.paused){

        player.play();

        playButton.innerHTML =
        '<i class="fa-solid fa-pause"></i>';

    }else{

        player.pause();

        playButton.innerHTML =
        '<i class="fa-solid fa-play"></i>';

    }

};

// =======================
// NEXT
// =======================

document.getElementById("nextButton").onclick = function(){

    currentTrack++;

    if(currentTrack >= playlist.length){

        currentTrack = 0;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML =
    '<i class="fa-solid fa-pause"></i>';

};

// =======================
// PREVIOUS
// =======================

document.getElementById("prevButton").onclick = function(){

    currentTrack--;

    if(currentTrack < 0){

        currentTrack = playlist.length - 1;

    }

    loadTrack(currentTrack);

    player.play();

    playButton.innerHTML =
    '<i class="fa-solid fa-pause"></i>';

};

// =======================
// ПРОГРЕСС
// =======================

player.addEventListener("loadedmetadata", function(){

    duration.textContent =
    formatTime(player.duration);

});

player.addEventListener("timeupdate", function(){

    if(player.duration){

        progress.value =
        (player.currentTime / player.duration) * 100;

        currentTime.textContent =
        formatTime(player.currentTime);

    }

});

progress.addEventListener("input", function(){

    if(player.duration){

        player.currentTime =
        (progress.value / 100) * player.duration;

    }

});

// =======================
// ФОРМАТ ВРЕМЕНИ
// =======================

function formatTime(seconds){

    const minutes = Math.floor(seconds / 60);

    const secs = Math.floor(seconds % 60);

    return minutes + ":" + secs.toString().padStart(2,"0");

}

// =======================
// ЗАГРУЗКА ПЕРВОГО ТРЕКА
// =======================

loadTrack(currentTrack);
</script>
    <script>
const sparkCanvas = document.getElementById("sparkCanvas");
const sctx = sparkCanvas.getContext("2d");

function resizeSpark(){
    sparkCanvas.width = window.innerWidth;
    sparkCanvas.height = window.innerHeight;
}
resizeSpark();
window.addEventListener("resize", resizeSpark);

const sparks=[];

function createSpark(){

    sparks.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        size:1+Math.random()*3,
        speed:0.3+Math.random()*0.8,
        alpha:0.6+Math.random()*0.4
    });

}

setInterval(createSpark,250);

function animateSpark(){

    sctx.clearRect(0,0,sparkCanvas.width,sparkCanvas.height);

    for(let i=sparks.length-1;i>=0;i--){

        const p=sparks[i];

        sctx.beginPath();

        sctx.fillStyle=`rgba(255,210,70,${p.alpha})`;

        sctx.shadowBlur=15;
        sctx.shadowColor="#FFD54A";

        sctx.arc(p.x,p.y,p.size,0,Math.PI*2);

        sctx.fill();

        p.y-=p.speed;

        p.alpha-=0.003;

        if(p.alpha<=0){
            sparks.splice(i,1);
        }

    }

    requestAnimationFrame(animateSpark);

}

animateSpark();
</script>
 <script>
const canvas = document.getElementById("smokeCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const particles = [];

for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:40+Math.random()*100,
        vx:(Math.random()-0.5)*0.15,
        vy:-0.15-Math.random()*0.25,
        alpha:0.12+Math.random()*0.10
    });
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{

        const g = ctx.createRadialGradient(
            p.x,p.y,0,
            p.x,p.y,p.r
        );

        g.addColorStop(0,`rgba(255,255,255,${p.alpha})`);
        g.addColorStop(1,"rgba(255,255,255,0)");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x+=p.vx;
        p.y+=p.vy;

        if(p.y<-p.r){
            p.y=canvas.height+p.r;
            p.x=Math.random()*canvas.width;
        }

        if(p.x<-p.r)p.x=canvas.width+p.r;
        if(p.x>canvas.width+p.r)p.x=-p.r;

    });

    requestAnimationFrame(draw);
}

draw();
     
</script>
    <script>
const crown = document.getElementById("crown");
        
let gp = Number(localStorage.getItem("gp")) || 0;

const gpCounter = document.getElementById("gpCounter");

function updateGP(){
    gpCounter.textContent = gp;
}

updateGP();

crown.addEventListener("click", () => {

    const rect = crown.getBoundingClientRect();

const plus = document.createElement("div");

plus.className = "plusOne";
    
const random = Math.random();

let reward = 1;

if (random < 0.65) {
    reward = 1;
    plus.textContent = "+1 GP";
    plus.style.color = "#FFD700";
}
else if (random < 0.85) {
    reward = 2;
    plus.textContent = "+2 GP";
    plus.style.color = "#FFD700";
}
else if (random < 0.95) {
    reward = 3;
    plus.textContent = "+3 GP";
    plus.style.color = "#FFA500";
}
else if (random < 0.99) {
    reward = 5;
    plus.textContent = "⭐ +5 GP";
    plus.style.color = "#FF8C00";
}
else {
    reward = 10;
    plus.textContent = "💎 +10 GP";
    plus.style.color = "#00E5FF";
}

gp += reward;
localStorage.setItem("gp", gp);
updateGP();

// Случайное появление по кругу вокруг короны
const angle = Math.random() * Math.PI * 2;
const distance = 30 + Math.random() * 90;

const offsetX = Math.cos(angle) * distance;
const offsetY = Math.sin(angle) * distance;

plus.style.left = (rect.left + rect.width / 2 + offsetX - 42) + "px";
plus.style.top = (rect.top + rect.height / 2 + offsetY) + "px";
    
    // Центрируем надпись относительно точки появления
plus.style.transform = "translate(-50%, -50%)";

document.body.appendChild(plus);

setTimeout(() => plus.remove(), 900);

    // Вибрация Telegram
    if (window.Telegram && Telegram.WebApp) {
        Telegram.WebApp.HapticFeedback.impactOccurred("light");
    }

    // Анимация
    crown.animate([
        { transform: "scale(1)" },
        { transform: "scale(0.92)" },
        { transform: "scale(1)" }
    ], {
        duration: 120
    });


});
</script>
